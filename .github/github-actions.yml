name: GitHub Actions Donation
on: [push]
jobs:
  init:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node_version: [24.x]
  steps:
      uses: actions/checkout@v5
    - name: Starting Node.js ${{ matrix.node_version }}
      uses: actions/setup-node@v4
      with:
        node-node_version: ${{ matrix.node_version }}
    - name: install modules
      run: npm install
    - name: build project
      run: npm run build
    - name: unit test
      run: npm run test
    - name: e2e test
      run: npm run test:e2e

